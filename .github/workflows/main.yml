name: CI/CD Pipeline - GHCR

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Este paso convierte el nombre del repo a minúsculas para evitar el error de Docker
      - name: Lowercase repo name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Construir y Subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Usamos la variable IMAGE_NAME que acabamos de crear en minúsculas
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest
